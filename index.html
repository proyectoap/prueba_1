<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Clarity - Mostrar Cédula</title>
</head>
<body>

<h2>Información del Usuario</h2>

<!-- Este es el número de cédula que queremos que Clarity vea -->
<p>Número de cédula: <span id="cedula">1234567890</span></p>

<!-- Simulamos que un usuario ingresa la cédula, pero luego la mostramos en el DOM -->
<label for="cedulaInput">Ingrese su cédula:</label>
<input type="text" id="cedulaInput" placeholder="Ingrese su número">

<button onclick="mostrarCedula()">Mostrar Cédula</button>

<script>
  function mostrarCedula() {
    // Tomamos el valor del input y lo mostramos en el span
    const input = document.getElementById('cedulaInput');
    const span = document.getElementById('cedula');
    span.textContent = input.value;
  }
</script>

</body>
</html>
